<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>📚 CiteFlow · Bushra Shaikh · iCreativez</title>
  <!-- Font Awesome 6 (Free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter + Outfit (modern, clean) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --font-primary: 'Inter', sans-serif;
      --font-display: 'Outfit', sans-serif;
      
      --bg-body: #f5f9ff;
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.6);
      --card-bg: rgba(255, 255, 255, 0.8);
      
      --primary: #3a5fe5;
      --primary-light: #ebf0ff;
      --primary-dark: #1e3fbc;
      --accent: #f97316;
      --accent-soft: #fff3e6;
      
      --text-dark: #0b1426;
      --text-soft: #2a354b;
      --text-muted: #5c6a81;
      
      --shadow-sm: 0 8px 20px -6px rgba(0, 20, 50, 0.06);
      --shadow-md: 0 20px 30px -12px rgba(0, 20, 40, 0.08);
      --shadow-lg: 0 30px 45px -15px rgba(18, 35, 60, 0.12);
      --shadow-glow: 0 0 0 1px rgba(58, 95, 229, 0.1), 0 12px 24px -10px rgba(58, 95, 229, 0.2);
      
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      
      --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
    }

    body {
      background: var(--bg-body);
      background-image: radial-gradient(circle at 10% 20%, rgba(58, 95, 229, 0.03) 0%, transparent 30%),
                        radial-gradient(circle at 90% 70%, rgba(249, 115, 22, 0.03) 0%, transparent 35%);
      min-height: 100vh;
      padding: 1.8rem 1.5rem 2.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-dark);
      font-family: var(--font-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .app-wrapper {
      max-width: 1400px;
      width: 100%;
    }

    /* ----- header moderno ----- */
    .app-header {
      margin-bottom: 2.2rem;
      animation: fadeSlide 0.6s ease;
    }

    .header-top {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem 1.5rem;
      margin-bottom: 0.5rem;
    }

    .app-header h1 {
      font-family: var(--font-display);
      font-weight: 650;
      font-size: 2.6rem;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #13294b, #1e3a8a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .app-header h1 i {
      background: linear-gradient(135deg, #3a5fe5, #2d4ec0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 2.4rem;
      filter: drop-shadow(0 6px 8px rgba(58, 95, 229, 0.15));
    }

    .header-badge {
      background: var(--primary-light);
      padding: 0.4rem 1.3rem;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--primary-dark);
      border: 1px solid rgba(58, 95, 229, 0.2);
      backdrop-filter: blur(4px);
      box-shadow: var(--shadow-sm);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .header-badge i {
      font-size: 0.9rem;
      color: var(--primary);
    }

    .header-sub {
      color: var(--text-muted);
      font-size: 1rem;
      padding-left: 18px;
      border-left: 4px solid var(--primary);
      font-weight: 400;
      margin-top: 6px;
      backdrop-filter: blur(4px);
    }

    /* ----- form panel (glass + floating) ----- */
    .form-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-xl);
      padding: 2rem 2rem 1.8rem;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.7) inset;
      margin-bottom: 2.5rem;
      border: 1px solid var(--glass-border);
      transition: var(--transition);
    }

    .form-panel:hover {
      box-shadow: var(--shadow-glow), 0 0 0 1px rgba(255,255,255,0.9) inset;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.3rem 1.5rem;
      align-items: end;
    }

    .input-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-field label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-field label i {
      font-size: 0.9rem;
      width: 1.2rem;
      color: var(--primary);
    }

    .input-field input, .input-field select {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(6px);
      border: 1.5px solid rgba(58, 95, 229, 0.15);
      border-radius: 20px;
      padding: 0.9rem 1.2rem;
      font-size: 0.95rem;
      font-family: var(--font-primary);
      font-weight: 450;
      transition: var(--transition);
      outline: none;
      color: var(--text-dark);
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }

    .input-field input:focus, .input-field select:focus {
      border-color: var(--primary);
      box-shadow: 0 10px 20px -10px rgba(58, 95, 229, 0.25), 0 0 0 4px rgba(58, 95, 229, 0.06);
      background: white;
      transform: scale(1.01);
    }

    .btn-add {
      background: linear-gradient(135deg, var(--primary) 0%, #2b4ac0 100%);
      color: white;
      border: none;
      padding: 0.95rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      font-family: var(--font-primary);
      cursor: pointer;
      box-shadow: 0 14px 22px -8px rgba(58, 95, 229, 0.35), 0 0 0 1px rgba(255,255,255,0.2) inset;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      white-space: nowrap;
      height: fit-content;
      border: 1px solid rgba(255,255,255,0.3);
      transform: translateY(0);
    }

    .btn-add i {
      font-size: 1rem;
    }

    .btn-add:hover {
      background: linear-gradient(135deg, #1e3fbc, #1536a0);
      box-shadow: 0 18px 28px -10px #1e3fbc, 0 0 0 2px rgba(255,255,255,0.5) inset;
      transform: translateY(-3px) scale(1.01);
    }

    .btn-add:active {
      transform: translateY(2px);
      box-shadow: 0 8px 16px -6px var(--primary);
    }

    /* ----- filter bar moderno ----- */
    .filter-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      padding: 0.5rem 1.2rem 0.5rem 2rem;
      border-radius: 60px;
      box-shadow: var(--shadow-md), 0 0 0 1px rgba(255,255,255,0.6) inset;
      border: 1px solid var(--glass-border);
    }

    .filter-group label {
      font-weight: 600;
      color: var(--text-soft);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #filterType {
      border: none;
      background: rgba(255,255,255,0.5);
      padding: 0.7rem 2rem 0.7rem 1.2rem;
      font-weight: 600;
      color: var(--primary-dark);
      outline: none;
      cursor: pointer;
      border-radius: 40px;
      font-size: 0.95rem;
      backdrop-filter: blur(6px);
      transition: var(--transition);
      border: 1px solid transparent;
    }

    #filterType:hover {
      background: white;
      border-color: var(--primary-light);
    }

    .stats-badge {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-weight: 600;
      color: var(--primary-dark);
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ----- grid de cards (elegante) ----- */
    .citations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 1.8rem;
      margin-top: 0.5rem;
    }

    .citation-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-lg);
      padding: 1.7rem 1.7rem 1.5rem;
      box-shadow: var(--shadow-md), 0 0 0 1px rgba(255,255,255,0.5) inset;
      border: 1px solid var(--glass-border);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      animation: cardFloat 0.5s ease backwards;
      transform-origin: center;
    }

    @keyframes cardFloat {
      0% { opacity: 0; transform: translateY(18px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .citation-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 30px 40px -15px rgba(18, 35, 60, 0.2), 0 0 0 1px rgba(255,255,255,0.8) inset;
      border-color: rgba(58, 95, 229, 0.2);
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      gap: 6px;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.35rem 1.2rem;
      border-radius: 40px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 18px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
      border: 0.5px solid white;
    }

    .card-badge i {
      font-size: 0.8rem;
    }

    .card-author-year {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0b1e38;
      margin-bottom: 8px;
      line-height: 1.3;
      letter-spacing: -0.01em;
      font-family: var(--font-display);
    }

    .card-title {
      font-size: 1.35rem;
      font-weight: 550;
      font-style: italic;
      margin-bottom: 12px;
      color: #1e293b;
      line-height: 1.35;
    }

    .card-details {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
      word-break: break-word;
      background: rgba(241, 245, 249, 0.3);
      padding: 8px 14px;
      border-radius: 16px;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-details i {
      opacity: 0.6;
      font-size: 0.8rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: auto;
      border-top: 1.5px dashed rgba(58, 95, 229, 0.15);
      padding-top: 18px;
    }

    .btn-icon {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.9);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.5rem 1.3rem;
      border-radius: 40px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-soft);
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      font-family: var(--font-primary);
    }

    .btn-copy {
      background: rgba(255,255,255,0.9);
      color: #1e3a8a;
    }
    .btn-copy i { color: var(--primary); }

    .btn-copy:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 10px 16px -8px rgba(58, 95, 229, 0.25);
    }

    .btn-delete {
      color: #b91c1c;
      background: rgba(254, 226, 226, 0.7);
    }
    .btn-delete i { color: #b91c1c; }

    .btn-delete:hover {
      background: #fee2e2;
      border-color: #f87171;
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 8px 14px -8px rgba(220, 38, 38, 0.2);
    }

    /* empty state — con íconos */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4.8rem 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--glass-border);
      animation: fadeIn 0.8s;
    }

    .empty-icon {
      font-size: 4.2rem;
      margin-bottom: 1.4rem;
      color: var(--primary);
      opacity: 0.5;
      animation: floatIcon 5s infinite;
    }

    @keyframes floatIcon {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .empty-state h3 {
      font-weight: 600;
      font-family: var(--font-display);
      font-size: 1.9rem;
      color: var(--text-dark);
    }

    /* toast modern */
    .toast-message {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: white;
      padding: 0.9rem 2.5rem;
      border-radius: 60px;
      font-weight: 500;
      box-shadow: 0 25px 35px -10px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.2) inset;
      z-index: 9999;
      animation: toastPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      border: 0.5px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1rem;
    }

    @keyframes toastPop {
      0% { opacity: 0; transform: translateX(-50%) scale(0.6) translateY(20px); }
      100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    }

    /* footer con font awesome */
    .intern-footer {
      margin-top: 4rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      padding-top: 2rem;
      border-top: 2px solid rgba(58, 95, 229, 0.12);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2.2rem;
      backdrop-filter: blur(4px);
      font-weight: 500;
    }

    .intern-footer span {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.3);
      padding: 5px 20px;
      border-radius: 40px;
      backdrop-filter: blur(6px);
    }

    /* responsive */
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .app-header h1 { font-size: 2rem; }
      .input-grid { grid-template-columns: 1fr; }
      .btn-add { width: 100%; }
      .filter-section { flex-direction: column; align-items: stretch; }
    }

    @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(-10px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
  </style>
</head>
<body>
<div class="app-wrapper">
  <!-- Header con Font Awesome -->
  <header class="app-header">
    <div class="header-top">
      <h1>
        <i class="fas fa-book-open"></i> 
        CiteFlow · Local
      </h1>
      <div class="header-badge">
        <i class="fas fa-cloud-upload-alt"></i> 
        <span>Private · Browser storage</span>
      </div>
    </div>
    <div class="header-sub">
      <i class="fas fa-pen-fancy" style="margin-right: 8px;"></i> 
      Modern citation hub · Bushra Shaikh
    </div>
  </header>

  <!-- Formulario con iconos Font Awesome -->
  <div class="form-panel">
    <div class="input-grid">
      <div class="input-field">
        <label><i class="fas fa-tag"></i> Type</label>
        <select id="citationType">
          <option value="Book" selected>📖 Book</option>
          <option value="Website">🌐 Website</option>
          <option value="Journal">📄 Journal</option>
        </select>
      </div>
      <div class="input-field">
        <label><i class="fas fa-user-edit"></i> Author *</label>
        <input type="text" id="authorInput" placeholder="e.g., Don Norman" autocomplete="off">
      </div>
      <div class="input-field">
        <label><i class="fas fa-heading"></i> Title *</label>
        <input type="text" id="titleInput" placeholder="The Design of Everyday Things" autocomplete="off">
      </div>
      <div class="input-field">
        <label><i class="fas fa-calendar-alt"></i> Year</label>
        <input type="text" id="yearInput" placeholder="2025">
      </div>
      <div class="input-field">
        <label><i class="fas fa-link"></i> Details</label>
        <input type="text" id="detailsInput" placeholder="Publisher / URL">
      </div>
      <button class="btn-add" id="addBtn">
        <i class="fas fa-plus-circle"></i> Add citation
      </button>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-section">
    <div class="filter-group">
      <label><i class="fas fa-filter"></i> Filter</label>
      <select id="filterType">
        <option value="All">📚 All citations</option>
        <option value="Book">📖 Books</option>
        <option value="Website">🌐 Websites</option>
        <option value="Journal">📄 Journals</option>
      </select>
    </div>
    <div class="stats-badge" id="statsDisplay">
      <i class="fas fa-list-ul"></i> <span>0 items</span>
    </div>
  </div>

  <!-- Cards container -->
  <div id="citationsContainer" class="citations-grid"></div>

  <!-- Footer -->
  <footer class="intern-footer">
    <span><i class="fas fa-user-graduate"></i> Bushra Shaikh</span>
  </footer>
</div>

<!-- Toast -->
<div id="liveToast" class="toast-message" style="display: none;">
  <i class="fas fa-check-circle"></i> Copied to clipboard
</div>

<script>
  (function(){
    "use strict";

    const typeSelect = document.getElementById('citationType');
    const authorInput = document.getElementById('authorInput');
    const titleInput = document.getElementById('titleInput');
    const yearInput = document.getElementById('yearInput');
    const detailsInput = document.getElementById('detailsInput');
    const addBtn = document.getElementById('addBtn');
    const filterSelect = document.getElementById('filterType');
    const container = document.getElementById('citationsContainer');
    const statsDisplay = document.getElementById('statsDisplay');
    const toastEl = document.getElementById('liveToast');

    const STORAGE_KEY = 'citeflow_modern_bushra';
    let citations = [];

    function showToast(msg, icon = 'check-circle') {
      toastEl.innerHTML = `<i class="fas fa-${icon}"></i> ${msg}`;
      toastEl.style.display = 'flex';
      toastEl.style.animation = 'none';
      toastEl.offsetHeight;
      toastEl.style.animation = 'toastPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
      setTimeout(() => toastEl.style.display = 'none', 2300);
    }

    function loadCitations() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { citations = JSON.parse(stored); } catch(e){ citations = []; }
      } else {
        citations = [
          { id: 'c1-'+Date.now(), type: 'Book', author: 'Don Norman', title: 'The Design of Everyday Things', year: '2013', details: 'Basic Books', dateAdded: new Date().toLocaleDateString() },
          { id: 'c2-'+Date.now(), type: 'Website', author: 'CSS-Tricks', title: 'A Complete Guide to Flexbox', year: '2025', details: 'css-tricks.com', dateAdded: new Date().toLocaleDateString() },
          { id: 'c3-'+Date.now(), type: 'Journal', author: 'Jane McGonigal', title: 'Reality is Broken', year: '2011', details: 'Penguin Press', dateAdded: new Date().toLocaleDateString() }
        ];
        saveToStorage();
      }
    }

    function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(citations)); }
    function generateId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 10); }

    function addCitation() {
      const author = authorInput.value.trim();
      const title = titleInput.value.trim();
      if (!author || !title) { showToast('Author & Title required', 'exclamation-triangle'); return; }
      const newCitation = {
        id: generateId(),
        type: typeSelect.value,
        author, title,
        year: yearInput.value.trim() || 'n.d.',
        details: detailsInput.value.trim() || '(no details)',
        dateAdded: new Date().toLocaleDateString()
      };
      citations.push(newCitation);
      saveToStorage();
      authorInput.value = titleInput.value = yearInput.value = detailsInput.value = '';
      authorInput.focus();
      renderCitations();
      showToast('Citation added!', 'sparkles');
    }

    function deleteCitation(id) {
      citations = citations.filter(c => c.id !== id);
      saveToStorage();
      renderCitations();
      showToast('Removed', 'trash-alt');
    }

    async function copyCitation(citation) {
      const formatted = `${citation.author}. (${citation.year}). ${citation.title}. ${citation.details}.`;
      try {
        await navigator.clipboard.writeText(formatted);
        showToast('Copied!', 'clipboard-check');
      } catch(e) {
        const ta = document.createElement('textarea');
        ta.value = formatted;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copied (fallback)', 'clipboard');
      }
    }

    function renderCitations() {
      const filter = filterSelect.value;
      let filtered = citations;
      if (filter !== 'All') filtered = citations.filter(c => c.type === filter);
      
      const total = citations.length;
      statsDisplay.innerHTML = `<i class="fas fa-list-ul"></i> <span>${total} item${total !== 1 ? 's' : ''} · ${filtered.length} shown</span>`;

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-bookmark"></i></div><h3>Your library is quiet</h3><p style="color:#5c6a81; margin-top:12px;">Add a reference — it will appear here beautifully.</p></div>`;
        return;
      }

      let html = '';
      filtered.forEach(c => {
        const typeIcon = c.type === 'Book' ? 'fa-book' : (c.type === 'Website' ? 'fa-globe' : 'fa-newspaper');
        html += `
          <div class="citation-card" data-id="${c.id}">
            <span class="card-badge"><i class="fas ${typeIcon}"></i> ${c.type}</span>
            <div class="card-author-year">${escapeHtml(c.author)} (${escapeHtml(c.year)})</div>
            <div class="card-title">${escapeHtml(c.title)}</div>
            <div class="card-details"><i class="fas fa-info-circle"></i> ${escapeHtml(c.details)}</div>
            <div class="card-footer">
              <button class="btn-icon btn-copy" data-action="copy" data-id="${c.id}"><i class="fas fa-copy"></i> Copy</button>
              <button class="btn-icon btn-delete" data-action="delete" data-id="${c.id}"><i class="fas fa-trash-alt"></i> Delete</button>
              <span style="margin-left:auto; font-size:0.75rem; opacity:0.5;"><i class="far fa-calendar-alt"></i></span>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;

      document.querySelectorAll('[data-action="copy"]').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); const cit = citations.find(c => c.id === btn.dataset.id); if(cit) copyCitation(cit); });
      });
      document.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); deleteCitation(btn.dataset.id); });
      });
    }

    function escapeHtml(t) { if(!t) return t; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function init() {
      loadCitations();
      renderCitations();
      addBtn.addEventListener('click', addCitation);
      [authorInput, titleInput, yearInput, detailsInput].forEach(i => i.addEventListener('keypress', e => { if(e.key==='Enter'){ e.preventDefault(); addCitation(); } }));
      filterSelect.addEventListener('change', renderCitations);
    }
    init();
  })();
</script>
</body>
</html>
