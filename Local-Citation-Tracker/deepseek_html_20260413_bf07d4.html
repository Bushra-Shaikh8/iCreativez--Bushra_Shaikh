<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>📚 CiteFlow · Local Tracker · Bushra Shaikh</title>
  <style>
    /* ----- MODERN RESET & VARIABLES (Sleek Academic + Micro‑interactions) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --bg-gradient: linear-gradient(145deg, #f4f7fc 0%, #eef2f9 100%);
      --surface: rgba(255, 255, 255, 0.85);
      --surface-solid: #ffffff;
      --glass-border: rgba(255, 255, 255, 0.6);
      --primary: #4361ee;
      --primary-glow: #4895ef;
      --primary-soft: #e0e7ff;
      --accent: #f72585;
      --accent-light: #ffb3c6;
      --text-dark: #1e1e2f;
      --text-soft: #334155;
      --text-muted: #64748b;
      --shadow-elevated: 0 20px 35px -8px rgba(0, 0, 0, 0.07), 0 8px 18px -6px rgba(0, 0, 0, 0.05);
      --shadow-card: 0 12px 28px -8px rgba(0, 20, 50, 0.08), 0 4px 10px rgba(0, 0, 0, 0.02);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --transition-smooth: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
      --transition-bounce: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      padding: 1.5rem 1.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-dark);
      backdrop-filter: blur(2px);
      animation: bgPulse 12s infinite alternate;
    }

    @keyframes bgPulse {
      0% { background: #f4f7fc; }
      100% { background: #e9eef5; }
    }

    .app-wrapper {
      max-width: 1340px;
      width: 100%;
    }

    /* ----- HEADER with modern flair ----- */
    .app-header {
      margin-bottom: 2.2rem;
      position: relative;
    }

    .app-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #1e1b4b 0%, #2d2a6e 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 10px rgba(67, 97, 238, 0.1);
      animation: slideDownFade 0.6s ease-out;
    }

    .app-header h1 span {
      font-size: 2.8rem;
      filter: drop-shadow(0 4px 6px rgba(67, 97, 238, 0.2));
    }

    .header-sub {
      color: var(--text-muted);
      font-size: 1rem;
      margin-top: 6px;
      padding-left: 18px;
      border-left: 5px solid var(--primary);
      font-weight: 400;
      backdrop-filter: blur(4px);
      display: inline-block;
      background: rgba(255,255,255,0.3);
      padding: 6px 18px;
      border-radius: 40px;
      animation: fadeIn 0.8s;
    }

    /* ----- GLASS FORM PANEL (modern, animated) ----- */
    .form-panel {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-xl);
      padding: 2rem 2rem 1.8rem;
      box-shadow: var(--shadow-elevated), 0 0 0 1px rgba(255,255,255,0.5) inset;
      margin-bottom: 2.5rem;
      border: 1px solid var(--glass-border);
      transition: var(--transition-smooth);
      animation: scaleIn 0.5s ease-out;
    }

    .form-panel:hover {
      box-shadow: var(--shadow-elevated), 0 0 0 1px rgba(255,255,255,0.8) inset;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.2rem 1.5rem;
      align-items: end;
    }

    .input-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-field label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--primary);
      opacity: 0.8;
      transition: var(--transition-smooth);
    }

    .input-field input, .input-field select {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      border: 1.5px solid rgba(67, 97, 238, 0.15);
      border-radius: 20px;
      padding: 0.85rem 1.2rem;
      font-size: 0.95rem;
      transition: var(--transition-smooth);
      outline: none;
      color: var(--text-dark);
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      font-weight: 450;
    }

    .input-field input:focus, .input-field select:focus {
      border-color: var(--primary);
      box-shadow: 0 8px 20px -6px rgba(67, 97, 238, 0.25), 0 0 0 3px rgba(67, 97, 238, 0.08);
      background: white;
      transform: scale(1.01);
    }

    .input-field input:hover, .input-field select:hover {
      border-color: var(--primary-glow);
      background: rgba(255,255,255,0.9);
    }

    .btn-add {
      background: linear-gradient(135deg, var(--primary) 0%, #3a5bd9 100%);
      color: white;
      border: none;
      padding: 0.9rem 2rem;
      border-radius: 48px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 10px 18px -6px rgba(67, 97, 238, 0.4), 0 0 0 1px rgba(255,255,255,0.2) inset;
      transition: var(--transition-bounce);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      height: fit-content;
      letter-spacing: 0.3px;
      border: 1px solid rgba(255,255,255,0.3);
      transform: translateY(0);
    }

    .btn-add:hover {
      background: linear-gradient(135deg, #2d4ed0 0%, #1e3ab0 100%);
      box-shadow: 0 16px 24px -8px var(--primary), 0 0 0 2px rgba(255,255,255,0.5) inset;
      transform: translateY(-3px) scale(1.02);
    }

    .btn-add:active {
      transform: translateY(2px);
      box-shadow: 0 6px 12px -4px var(--primary);
    }

    /* ----- FILTER BAR (elevated) ----- */
    .filter-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 15px;
      background: var(--surface);
      backdrop-filter: blur(12px);
      padding: 0.5rem 1rem 0.5rem 1.8rem;
      border-radius: 60px;
      box-shadow: var(--shadow-card), 0 0 0 1px rgba(255,255,255,0.5) inset;
      border: 1px solid var(--glass-border);
      transition: var(--transition-smooth);
    }

    .filter-group:hover {
      box-shadow: var(--shadow-elevated);
    }

    .filter-group label {
      font-weight: 600;
      color: var(--text-soft);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #filterType {
      border: none;
      background: rgba(255,255,240,0.5);
      padding: 0.6rem 2rem 0.6rem 1rem;
      font-weight: 600;
      color: var(--primary);
      outline: none;
      cursor: pointer;
      border-radius: 40px;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
      transition: var(--transition-smooth);
      border: 1px solid transparent;
    }

    #filterType:hover {
      background: white;
      border-color: var(--primary-soft);
    }

    .stats-badge {
      background: linear-gradient(145deg, #ffffff 0%, #f8faff 100%);
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-weight: 600;
      color: var(--primary);
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(4px);
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ----- CARDS GRID (beautiful animations) ----- */
    .citations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.8rem;
      margin-top: 0.5rem;
    }

    .citation-card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      padding: 1.6rem 1.6rem 1.4rem;
      box-shadow: var(--shadow-card), 0 0 0 1px rgba(255,255,255,0.5) inset;
      border: 1px solid var(--glass-border);
      transition: var(--transition-bounce);
      display: flex;
      flex-direction: column;
      animation: cardAppear 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2) both;
      transform-origin: center;
      will-change: transform, box-shadow;
    }

    @keyframes cardAppear {
      0% { opacity: 0; transform: translateY(20px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .citation-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 30px 40px -16px rgba(31, 38, 135, 0.15), 0 0 0 1px rgba(255,255,255,0.7) inset;
      border-color: rgba(67, 97, 238, 0.2);
    }

    .card-badge {
      display: inline-block;
      align-self: flex-start;
      background: linear-gradient(145deg, var(--primary-soft), #dbe7ff);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.7rem;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 16px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 2px 4px rgba(67,97,238,0.05);
      border: 0.5px solid white;
      transition: var(--transition-smooth);
    }

    .card-author-year {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0b1e38;
      margin-bottom: 8px;
      line-height: 1.4;
      letter-spacing: -0.01em;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 550;
      font-style: italic;
      margin-bottom: 12px;
      color: #1e293b;
      line-height: 1.35;
    }

    .card-details {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
      word-break: break-word;
      background: rgba(241, 245, 249, 0.3);
      padding: 6px 10px;
      border-radius: 14px;
      backdrop-filter: blur(2px);
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: auto;
      border-top: 1.5px dashed rgba(67, 97, 238, 0.15);
      padding-top: 16px;
    }

    .btn-icon {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.8);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.5rem 1.1rem;
      border-radius: 36px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition-bounce);
      color: var(--text-soft);
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .btn-copy {
      background: rgba(255,255,255,0.8);
      color: #1e3a8a;
    }

    .btn-copy:hover {
      background: var(--primary-soft);
      border-color: var(--primary);
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 8px 12px -6px rgba(67, 97, 238, 0.2);
    }

    .btn-delete {
      color: #b91c1c;
      background: rgba(254, 226, 226, 0.6);
    }

    .btn-delete:hover {
      background: #fee2e2;
      border-color: #f87171;
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 6px 12px -6px rgba(220, 38, 38, 0.2);
    }

    /* empty state — charming */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4.5rem 2rem;
      background: var(--surface);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      box-shadow: var(--shadow-elevated);
      border: 1px solid var(--glass-border);
      animation: fadeIn 0.8s;
    }

    .empty-icon {
      font-size: 4.5rem;
      margin-bottom: 1.2rem;
      filter: drop-shadow(0 8px 12px rgba(67, 97, 238, 0.1));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .empty-state h3 {
      font-weight: 600;
      color: var(--text-dark);
      font-size: 1.7rem;
    }

    /* ----- TOAST (modern, slick) ----- */
    .toast-message {
      position: fixed;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 35, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: white;
      padding: 0.9rem 2.2rem;
      border-radius: 60px;
      font-weight: 500;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.2) inset;
      z-index: 9999;
      animation: toastPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      border: 0.5px solid rgba(255,255,255,0.3);
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @keyframes toastPop {
      0% { opacity: 0; transform: translateX(-50%) scale(0.7) translateY(20px); }
      100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
    }

    /* footer */
    .intern-footer {
      margin-top: 4rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding-top: 2rem;
      border-top: 2px solid rgba(67, 97, 238, 0.15);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      backdrop-filter: blur(4px);
      font-weight: 500;
    }

    .intern-footer span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.3);
      padding: 4px 16px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
    }

    /* keyframe animations */
    @keyframes slideDownFade {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes scaleIn {
      0% { opacity: 0; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* responsive love */
    @media (max-width: 600px) {
      body { padding: 0.8rem; }
      .app-header h1 { font-size: 2rem; }
      .input-grid { grid-template-columns: 1fr; }
      .btn-add { width: 100%; }
      .filter-section { flex-direction: column; align-items: stretch; }
      .filter-group { justify-content: space-between; }
    }
  </style>
  <!-- Preconnect for smooth font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
  <!-- Header with animated gradient -->
  <header class="app-header">
    <h1>
      <span>📚</span> CiteFlow · Local Tracker
    </h1>
    <div class="header-sub">✨ Stored privately · modern citation hub · Bushra Shaikh</div>
  </header>

  <!-- Form Section (glassmorphism) -->
  <div class="form-panel">
    <div class="input-grid">
      <div class="input-field">
        <label>📌 Type</label>
        <select id="citationType">
          <option value="Book" selected>📖 Book</option>
          <option value="Website">🌐 Website</option>
          <option value="Journal">📄 Journal</option>
        </select>
      </div>
      <div class="input-field">
        <label>👤 Author *</label>
        <input type="text" id="authorInput" placeholder="e.g., Angela Yu" autocomplete="off">
      </div>
      <div class="input-field">
        <label>📘 Title *</label>
        <input type="text" id="titleInput" placeholder="The Design of Everyday Things" autocomplete="off">
      </div>
      <div class="input-field">
        <label>📅 Year</label>
        <input type="text" id="yearInput" placeholder="2025">
      </div>
      <div class="input-field">
        <label>🔗 Details</label>
        <input type="text" id="detailsInput" placeholder="Publisher / URL">
      </div>
      <button class="btn-add" id="addBtn">
        <span>✨</span> Add citation
      </button>
    </div>
  </div>

  <!-- Filter Bar with micro-interactions -->
  <div class="filter-section">
    <div class="filter-group">
      <label>🔍 Filter</label>
      <select id="filterType">
        <option value="All">📚 All citations</option>
        <option value="Book">📖 Books</option>
        <option value="Website">🌐 Websites</option>
        <option value="Journal">📄 Journals</option>
      </select>
    </div>
    <div class="stats-badge" id="statsDisplay">
      <span>📋</span> 0 items
    </div>
  </div>

  <!-- Cards injected dynamically -->
  <div id="citationsContainer" class="citations-grid"></div>

  <!-- Footer: Internship identity -->
  <footer class="intern-footer">
    <span>🧑‍🎓 Bushra Shaikh</span>
    <span>📋 Task 45 · Local Citation Tracker</span>
    <span>🏢 iCreativez Internship</span>
  </footer>
</div>

<!-- Modern Toast (hidden initially) -->
<div id="liveToast" class="toast-message" style="display: none;">
  <span>✅</span> Copied to clipboard
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM refs ----------
    const typeSelect = document.getElementById('citationType');
    const authorInput = document.getElementById('authorInput');
    const titleInput = document.getElementById('titleInput');
    const yearInput = document.getElementById('yearInput');
    const detailsInput = document.getElementById('detailsInput');
    const addBtn = document.getElementById('addBtn');
    const filterSelect = document.getElementById('filterType');
    const container = document.getElementById('citationsContainer');
    const statsDisplay = document.getElementById('statsDisplay');
    const toastEl = document.getElementById('liveToast');

    const STORAGE_KEY = 'citeflow_bushra_icreativez';
    let citations = [];

    // ---------- Toast with smooth animation ----------
    function showToast(message, emoji = '✅') {
      toastEl.innerHTML = `<span>${emoji}</span> ${message}`;
      toastEl.style.display = 'flex';
      // re-trigger animation
      toastEl.style.animation = 'none';
      toastEl.offsetHeight; // reflow
      toastEl.style.animation = 'toastPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
      setTimeout(() => {
        toastEl.style.display = 'none';
      }, 2200);
    }

    // ---------- Storage ----------
    function loadCitations() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try { citations = JSON.parse(stored); } catch(e){ citations = []; }
      } else {
        // initial sample citations (modern references)
        citations = [
          { id: 'c1-'+Date.now()+'-a', type: 'Book', author: 'Don Norman', title: 'The Design of Everyday Things', year: '2013', details: 'Basic Books', dateAdded: new Date().toLocaleDateString() },
          { id: 'c2-'+Date.now()+'-b', type: 'Website', author: 'CSS-Tricks', title: 'A Complete Guide to Flexbox', year: '2025', details: 'css-tricks.com', dateAdded: new Date().toLocaleDateString() },
          { id: 'c3-'+Date.now()+'-c', type: 'Journal', author: 'Jane McGonigal', title: 'Reality is Broken', year: '2011', details: 'Penguin Press', dateAdded: new Date().toLocaleDateString() }
        ];
        saveToStorage();
      }
    }

    function saveToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(citations));
    }

    function generateId() {
      return Date.now() + '-' + Math.random().toString(36).substring(2, 12);
    }

    // ---------- Add citation ----------
    function addCitation() {
      const author = authorInput.value.trim();
      const title = titleInput.value.trim();
      if (!author || !title) {
        showToast('Author & Title are required', '⚠️');
        return;
      }
      const newCitation = {
        id: generateId(),
        type: typeSelect.value,
        author: author,
        title: title,
        year: yearInput.value.trim() || 'n.d.',
        details: detailsInput.value.trim() || '(no details)',
        dateAdded: new Date().toLocaleDateString()
      };
      citations.push(newCitation);
      saveToStorage();
      
      // Clear form
      authorInput.value = '';
      titleInput.value = '';
      yearInput.value = '';
      detailsInput.value = '';
      authorInput.focus();
      
      renderCitations();
      showToast('Citation added successfully!', '✨');
    }

    // ---------- Delete ----------
    function deleteCitation(id) {
      citations = citations.filter(c => c.id !== id);
      saveToStorage();
      renderCitations();
      showToast('Citation removed', '🗑️');
    }

    // ---------- Copy (modern clipboard) ----------
    async function copyCitation(citation) {
      const formatted = `${citation.author}. (${citation.year}). ${citation.title}. ${citation.details}.`;
      try {
        await navigator.clipboard.writeText(formatted);
        showToast('Copied to clipboard', '📋');
      } catch (e) {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = formatted;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Copied (fallback)', '📋');
      }
    }

    // ---------- Render cards with animation ----------
    function renderCitations() {
      const filter = filterSelect.value;
      let filtered = citations;
      if (filter !== 'All') filtered = citations.filter(c => c.type === filter);
      
      const total = citations.length;
      statsDisplay.innerHTML = `<span>📋</span> ${total} item${total !== 1 ? 's' : ''} · ${filtered.length} shown`;

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭✨</div>
            <h3>Your library is quiet</h3>
            <p style="color: #64748b; margin-top: 12px; font-size: 1.1rem;">Add your first reference — it’ll appear here beautifully.</p>
          </div>
        `;
        return;
      }

      let html = '';
      filtered.forEach(c => {
        html += `
          <div class="citation-card" data-id="${c.id}">
            <span class="card-badge">${c.type}</span>
            <div class="card-author-year">${escapeHtml(c.author)} (${escapeHtml(c.year)})</div>
            <div class="card-title">${escapeHtml(c.title)}</div>
            <div class="card-details">${escapeHtml(c.details)}</div>
            <div class="card-footer">
              <button class="btn-icon btn-copy" data-action="copy" data-id="${c.id}"><span>📋</span> Copy</button>
              <button class="btn-icon btn-delete" data-action="delete" data-id="${c.id}"><span>🗑️</span> Delete</button>
              <span style="margin-left: auto; font-size:0.7rem; opacity:0.6;" title="Added ${c.dateAdded}">📅</span>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;

      // Attach listeners with smooth animation awareness
      document.querySelectorAll('[data-action="copy"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          const cit = citations.find(c => c.id === id);
          if (cit) copyCitation(cit);
        });
      });
      document.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteCitation(btn.dataset.id);
        });
      });
    }

    function escapeHtml(text) {
      if (!text) return text;
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    // ---------- Filter change ----------
    function handleFilter() { renderCitations(); }

    // ---------- Init ----------
    function init() {
      loadCitations();
      renderCitations();
      
      addBtn.addEventListener('click', addCitation);
      const inputs = [authorInput, titleInput, yearInput, detailsInput];
      inputs.forEach(inp => inp.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') { e.preventDefault(); addCitation(); }
      }));
      filterSelect.addEventListener('change', handleFilter);
    }

    init();
  })();
</script>
</body>
</html>
